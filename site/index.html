<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Diaries of James David Smillie</title>
  <meta name="description" content="AI-generated transcriptions of the personal diaries of American artist James David Smillie (1833-1909), spanning 1865-1909.">

  <link rel="canonical" href="https://smilliediaries.com/">

  <!-- OpenGraph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="The Diaries of James David Smillie">
  <meta property="og:url" content="https://smilliediaries.com/">
  <meta property="og:title" content="The Diaries of James David Smillie">
  <meta property="og:description" content="Transcriptions of the personal diaries of American artist James David Smillie (1833-1909), spanning 1865-1909.">
  <!-- og:image: add a 1200×630 image asset and reference it here -->

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="The Diaries of James David Smillie">
  <meta name="twitter:description" content="Transcriptions of the personal diaries of American artist James David Smillie (1833-1909), spanning 1865-1909.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="/favicon.ico">
</head>
<body>
  <header class="header">
    <a href="/" class="header-title">The Diaries of James David Smillie</a>
    <form id="search-form" class="search-form" role="search">
      <label for="search-input" class="visually-hidden">Search diaries</label>
      <input type="search" id="search-input" class="search-input" placeholder="Search..." autocomplete="off">
      <button type="submit" class="search-btn">Search</button>
    </form>
    <nav class="header-nav">
      <a href="/about.html">About</a>
    </nav>
  </header>

  <!-- Diary viewer -->
  <main class="main" id="viewer-page">
    <!-- Navigation controls -->
    <div class="nav-controls">
      <div class="nav-buttons">
        <button type="button" id="prev-btn" class="nav-btn" aria-label="Previous image">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Prev
        </button>
        <label for="date-picker" class="visually-hidden">Jump to date</label>
        <input type="date" id="date-picker" class="date-picker nav-date-picker" aria-label="Jump to date">
        <button type="button" id="next-btn" class="nav-btn" aria-label="Next image">
          Next
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="scrubber-container">
        <input type="range" id="scrubber" class="scrubber" min="0" max="100" value="0" aria-label="Timeline scrubber">
        <div id="year-labels" class="year-labels"></div>
      </div>
    </div>

    <!-- Diary photograph -->
    <div class="image-container">
      <img id="diary-image" src="" alt="" class="diary-image" loading="eager">
      <div id="image-loading" class="image-loading" aria-label="Loading image">
        <span class="spinner"></span>
      </div>
    </div>

    <!-- Transcription area -->
    <div id="transcription-area" class="transcription-area">
      <div class="tx-loading" aria-label="Loading transcription" aria-live="polite">
        <span class="spinner"></span>
      </div>
    </div>

    <!-- Bottom navigation -->
    <div class="bottom-nav">
      <button type="button" id="prev-btn-bottom" class="nav-btn" aria-label="Previous image">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Prev
      </button>
      <button type="button" id="next-btn-bottom" class="nav-btn" aria-label="Next image">
        Next
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </main>

  <!-- Search results page -->
  <main class="main search-page" id="search-page" hidden>
    <div class="search-page-header">
      <h1 class="search-heading">Results for <em id="search-query-display"></em></h1>
    </div>
    <div id="search-results" class="search-results-list" aria-live="polite"></div>
  </main>

  <!-- Lightbox for zoomed image -->
  <div id="lightbox" class="lightbox" role="dialog" aria-label="Zoomed diary image" aria-modal="true">
    <img id="lightbox-image" src="" alt="" class="lightbox-image">
    <button type="button" id="lightbox-close" class="lightbox-close" aria-label="Close">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
