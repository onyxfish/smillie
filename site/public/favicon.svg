<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Page edges (right side) -->
  <rect x="25" y="3" width="4" height="26" rx="1" fill="#f0e8d8"/>
  <!-- Main diary cover -->
  <rect x="3" y="2" width="22" height="28" rx="2" fill="#7c5c2e"/>
  <!-- Spine (left strip) -->
  <rect x="3" y="2" width="5" height="28" rx="2" fill="#5c4422"/>
  <rect x="6" y="2" width="2" height="28" fill="#5c4422"/>
  <!-- Writing lines on cover -->
  <line x1="11" y1="10" x2="23" y2="10" stroke="#f0e8d8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="11" y1="15" x2="23" y2="15" stroke="#f0e8d8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="11" y1="20" x2="23" y2="20" stroke="#f0e8d8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>